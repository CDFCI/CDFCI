name: CDFCI Test

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install GCC 11
        run: |
          sudo apt update
          sudo apt install -y g++-11
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100
      - name: Build and Test
        run: |
          g++ --version
          make examples

  regression-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install GCC 11
        run: |
          sudo apt update
          sudo apt install -y g++-11
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100
      - name: Build and Test
        run: |
          g++ --version
          make test

  release-artifacts:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install GCC 11
        run: |
          sudo apt update
          sudo apt install -y g++-11
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100
      - name: Build release binaries
        run: |
          g++ --version
          make all
      - name: Package release artifacts
        run: |
          mkdir -p release
          cp -r bin release/bin
          cp README.md CHANGELOG.md LICENSE release/
          tar -czf cdfci-${GITHUB_REF_NAME}-linux-x64.tar.gz -C release .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdfci-${{ github.ref_name }}-linux-x64
          path: cdfci-${{ github.ref_name }}-linux-x64.tar.gz
